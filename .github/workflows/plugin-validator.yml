name: Plugin Validator

on:
  push:
    paths:
      - '005-plugins/**'
      - '004-scripts/validate-all-plugins.sh'
      - '.github/workflows/plugin-validator.yml'
  pull_request:
    paths:
      - '005-plugins/**'
      - '004-scripts/validate-all-plugins.sh'
  workflow_dispatch:
    inputs:
      plugin_name:
        description: 'Plugin folder name under 005-plugins/ (leave empty for all)'
        required: false
        type: string

jobs:
  detect-plugins:
    name: Detect Plugins to Validate
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect plugins
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.plugin_name }}" ]; then
            echo "matrix={\"plugin\":[\"${{ inputs.plugin_name }}\"]}" >> $GITHUB_OUTPUT
            exit 0
          fi

          plugins=$(ls -1 005-plugins 2>/dev/null | tr '\n' ' ' | xargs)
          if [ -z "$plugins" ]; then
            echo "matrix={\"plugin\":[]}" >> $GITHUB_OUTPUT
            exit 0
          fi

          json_array=$(echo "$plugins" | jq -R -c 'split(" ")')
          echo "matrix={\"plugin\":$json_array}" >> $GITHUB_OUTPUT

  validate:
    name: Validate Plugin (${{ matrix.plugin }})
    runs-on: ubuntu-latest
    needs: detect-plugins
    strategy:
      matrix: ${{ fromJson(needs.detect-plugins.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Install jq for JSON validation
        run: sudo apt-get install -y jq
      - name: Run canonical plugin validator
        run: |
          bash 004-scripts/validate-all-plugins.sh "005-plugins/${{ matrix.plugin }}"
