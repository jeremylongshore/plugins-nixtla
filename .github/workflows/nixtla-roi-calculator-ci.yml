name: Nixtla ROI Calculator CI

on:
  push:
    branches:
      - main
    paths:
      - '005-plugins/nixtla-roi-calculator/**'
      - '.github/workflows/nixtla-roi-calculator-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - '005-plugins/nixtla-roi-calculator/**'
      - '.github/workflows/nixtla-roi-calculator-ci.yml'

jobs:
  test:
    name: Test + Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 005-plugins/nixtla-roi-calculator

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: '005-plugins/nixtla-roi-calculator/scripts/requirements.txt'

      - name: Install plugin dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          pip install pytest pytest-cov

      - name: Import sanity check
        run: |
          python -c "import sys; sys.path.insert(0, 'scripts'); import roi_calculator_mcp; print('IMPORTS OK')"

      - name: Run pytest with coverage
        run: |
          PYTHONPATH=scripts pytest tests/ \
            --cov=roi_calculator_mcp \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nixtla-roi-calculator-coverage
          path: 005-plugins/nixtla-roi-calculator/coverage.xml
          retention-days: 14

  validator-gate:
    name: Plugin Validator v7.0 (marketplace tier)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          path: plugins-nixtla

      - name: Checkout claude-code-plugins (canonical validator source)
        uses: actions/checkout@v4
        with:
          repository: jeremylongshore/claude-code-plugins
          path: claude-code-plugins
          ref: main

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install validator dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema

      - name: Validate nixtla-roi-calculator (marketplace tier)
        run: |
          python claude-code-plugins/scripts/validate-skills-schema.py \
            --marketplace \
            plugins-nixtla/005-plugins/nixtla-roi-calculator/ \
          || (echo "::error::Plugin Validator v7.0 (marketplace tier) failed for nixtla-roi-calculator. See SCHEMA_CHANGELOG.md non-negotiables." && exit 1)
