name: Nixtla Baseline Lab CI

on:
  push:
    branches:
      - main
    paths:
      - '005-plugins/nixtla-baseline-lab/**'
      - '.github/workflows/nixtla-baseline-lab-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - '005-plugins/nixtla-baseline-lab/**'
      - '.github/workflows/nixtla-baseline-lab-ci.yml'

jobs:
  unit-tests:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: '005-plugins/nixtla-baseline-lab/scripts/requirements.txt'

      - name: Install dependencies
        working-directory: 005-plugins/nixtla-baseline-lab
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r scripts/requirements.txt

      - name: Run pytest unit tests
        working-directory: 005-plugins/nixtla-baseline-lab
        # Override repo-root pytest.ini addopts (which inject --cov flags) so
        # the per-plugin job runs in isolation.
        run: pytest tests/test_mcp_server.py -v -o addopts="" -p no:cacheprovider

  smoke-test:
    name: Smoke Test (M4 forecasting)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: '005-plugins/nixtla-baseline-lab/scripts/requirements.txt'

      - name: Install Nixtla OSS dependencies
        working-directory: 005-plugins/nixtla-baseline-lab
        run: |
          echo "Installing Nixtla OSS dependencies..."
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          echo "Installed packages:"
          pip list | grep -E "(statsforecast|datasetsforecast|pandas|numpy|matplotlib|nixtla)"

      - name: Run MCP server test
        working-directory: 005-plugins/nixtla-baseline-lab
        run: |
          echo "Running MCP server in test mode..."
          python scripts/nixtla_baseline_mcp.py test

      - name: Run golden task validation
        working-directory: 005-plugins/nixtla-baseline-lab
        run: |
          echo "Running golden task smoke test..."
          python tests/run_baseline_m4_smoke.py

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nixtla-baseline-test-results
          path: |
            005-plugins/nixtla-baseline-lab/nixtla_baseline_m4_test/
          retention-days: 7

  validator-gate:
    name: Plugin Validator v7.0 (marketplace tier)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          path: plugins-nixtla

      - name: Checkout claude-code-plugins
        uses: actions/checkout@v4
        with:
          repository: jeremylongshore/claude-code-plugins
          path: claude-code-plugins
          ref: main

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install validator deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema

      - name: Validate (marketplace tier)
        run: |
          python claude-code-plugins/scripts/validate-skills-schema.py \
            --marketplace \
            plugins-nixtla/005-plugins/nixtla-baseline-lab/ \
          || (echo "::error::Validator failed for nixtla-baseline-lab." && exit 1)
