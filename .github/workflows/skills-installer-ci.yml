name: Skills Installer E2E

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  skills-installer-e2e:
    name: Skills Installer E2E Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install installer package (editable mode)
        run: |
          python -m pip install --upgrade pip
          pip install -e 006-packages/nixtla-claude-skills-installer

      - name: Run skills installer E2E test
        run: |
          python 007-tests/test_skills_installer_e2e.py

      - name: Verify test passed
        if: success()
        run: |
          echo "✅ Skills installer E2E test passed!"
          echo "All Nixtla skills installed successfully in temp directory."
