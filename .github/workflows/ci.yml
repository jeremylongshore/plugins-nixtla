name: CI - Continuous Integration

# =============================================================================
# COST-OPTIMIZED CI STRATEGY (CTO Directive - December 2025)
# =============================================================================
# Problem: macOS = 10x multiplier, Windows = 2x multiplier on free minutes
# Solution: Tiered approach - fast feedback on push, full matrix on PR/release
#
# TIER 1 (Every push): Linux + Python 3.11 only (~2 min)
# TIER 2 (PRs to main): Full OS matrix, all Python versions (~15 min)
# TIER 3 (Weekly): Scheduled comprehensive audits
# =============================================================================

on:
  push:
    branches: [main, develop]
    paths:
      # Only run on actual code changes, not docs
      - '**.py'
      - '**.js'
      - '**.ts'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      full_matrix:
        description: 'Run full OS/Python matrix (costs more minutes)'
        required: false
        default: 'false'
        type: boolean

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # ===========================================================================
  # TIER 1: Fast Feedback (Every Push) - Linux only, ~2 minutes
  # ===========================================================================
  lint-and-format:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-

      - name: Install linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 isort

      - name: Run Black formatter check
        run: black --check --diff .

      - name: Run isort import checker
        run: isort --check-only --diff .

      - name: Run Flake8 linter
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  test-primary:
    name: Tests (Primary)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-test-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest --cov=plugins --cov=examples --cov-report=term -v

  validate-plugins:
    name: Validate Plugin Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq for JSON validation
        run: sudo apt-get install -y jq

      - name: Validate plugin.json files
        run: |
          echo "Validating plugin.json files..."
          for plugin_json in $(find plugins -name "plugin.json" 2>/dev/null); do
            echo "Checking $plugin_json"
            jq empty "$plugin_json" || exit 1
            jq -e '.name' "$plugin_json" > /dev/null || (echo "Missing 'name' in $plugin_json" && exit 1)
            jq -e '.version' "$plugin_json" > /dev/null || (echo "Missing 'version' in $plugin_json" && exit 1)
          done
          echo "All plugin.json files valid"

  # ===========================================================================
  # TIER 2: Full Matrix (PRs only) - All OS + Python versions
  # Cost: ~15-20 minutes but only runs on PRs, not every push
  # ===========================================================================
  test-matrix:
    name: Tests (${{ matrix.os }} / Python ${{ matrix.python-version }})
    if: github.event_name == 'pull_request' || inputs.full_matrix == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Reduced matrix: Linux gets all versions, others get 3.11 only
        include:
          # Linux - test all Python versions (1x multiplier)
          - os: ubuntu-latest
            python-version: '3.9'
          - os: ubuntu-latest
            python-version: '3.10'
          - os: ubuntu-latest
            python-version: '3.12'
          # Windows - 3.11 only (2x multiplier)
          - os: windows-latest
            python-version: '3.11'
          # macOS - 3.11 only (10x multiplier - use sparingly!)
          - os: macos-latest
            python-version: '3.11'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/Library/Caches/pip
            ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-${{ matrix.python-version }}-pip-${{ hashFiles('**/requirements*.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -v

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    # Only run on PRs and main pushes, not develop
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy security scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Check for secrets in code
        run: |
          echo "Checking for hardcoded secrets..."
          if grep -r --include="*.py" --include="*.js" --include="*.ts" \
             -E "(api_key|secret|password|token)\s*=\s*['\"][^'\"]+['\"]" \
             --exclude-dir=venv --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=archive . 2>/dev/null; then
            echo "⚠️ Potential secrets found - review required"
          else
            echo "✅ No obvious secrets detected"
          fi

  # ===========================================================================
  # Final Gate
  # ===========================================================================
  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs:
      - lint-and-format
      - test-primary
      - validate-plugins
    if: always()
    steps:
      - name: Check job results
        run: |
          if [ "${{ needs.lint-and-format.result }}" != "success" ]; then
            echo "Lint checks failed"
            exit 1
          fi
          if [ "${{ needs.test-primary.result }}" != "success" ]; then
            echo "Primary tests failed"
            exit 1
          fi
          if [ "${{ needs.validate-plugins.result }}" != "success" ]; then
            echo "Plugin validation failed"
            exit 1
          fi
          echo "✅ All CI checks passed successfully!"
