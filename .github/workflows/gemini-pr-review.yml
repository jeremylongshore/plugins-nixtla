name: Gemini Pro Code Review (Vertex AI)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  gemini_review:
    runs-on: ubuntu-latest
    timeout-minutes: 7

    permissions:
      contents: read
      id-token: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/859338910722/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: nixtla-github-deployer@nixtla-playground-01.iam.gserviceaccount.com

      - name: Run Gemini CLI for PR Review
        uses: google-github-actions/run-gemini-cli@v0.1.16
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_ISSUE_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          use_vertex_ai: true
          gcp_project_id: nixtla-playground-01
          gcp_location: us-central1
          prompt: /gemini-review
