name: Gemini Pro Code Review (Vertex AI)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  gemini_review:
    runs-on: ubuntu-latest
    # Only run on PR events OR when someone mentions @gemini-cli in a comment
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@gemini-cli'))

    permissions:
      contents: read
      id-token: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/859338910722/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: nixtla-github-deployer@nixtla-playground-01.iam.gserviceaccount.com

      - name: Run Gemini CLI for PR Review
        uses: google-github-actions/run-gemini-cli@v0.1.16
        with:
          use_vertex_ai: true
          gcp_project_id: nixtla-playground-01
          gcp_location: us-central1
          gcp_service_account: nixtla-github-deployer@nixtla-playground-01.iam.gserviceaccount.com
          gcp_workload_identity_provider: projects/859338910722/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          gemini_model: gemini-2.5-pro-preview-05-06
          prompt: |
            You are a senior code reviewer for the Nixtla Claude Code Plugins project.
            This is an experimental/prototype showcase repository for time-series forecasting.

            Review this PR with focus on:
            1. Security vulnerabilities (API keys, secrets, injection risks)
            2. Python code quality (PEP-8, type hints, error handling)
            3. Nixtla integration patterns (statsforecast, TimeGPT usage)
            4. Logic errors and edge cases

            Be constructive but thorough. If the code is good, approve it.
            If there are issues, explain clearly and suggest fixes.
