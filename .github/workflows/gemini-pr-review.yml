name: Gemini Pro Code Review (Vertex AI)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  gemini_review:
    runs-on: ubuntu-latest
    timeout-minutes: 7

    permissions:
      contents: read
      id-token: write
      pull-requests: write
      issues: write

    steps:
      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/859338910722/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: nixtla-github-deployer@nixtla-playground-01.iam.gserviceaccount.com

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gemini CLI for PR Review
        uses: google-github-actions/run-gemini-cli@v0.1.16
        with:
          gcp_project_id: nixtla-playground-01
          gcp_location: us-central1
          gcp_workload_identity_provider: projects/859338910722/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          gcp_service_account: nixtla-github-deployer@nixtla-playground-01.iam.gserviceaccount.com
          use_vertex_ai: true
          gemini_model: gemini-2.0-flash
          prompt: |
            You are a Senior Time-Series ML Engineer and Cloud Integration Specialist.
            Review this Pull Request and provide clear, actionable inline comments.

            ## Nixtla Ecosystem Review (Critical)
            - Data Format: Check for Nixtla long format (unique_id, ds, y columns)
            - Split Strategy: Verify time-series-aware splitting, NOT random CV
            - Model Selection: Assess if chosen model fits data characteristics
            - Evaluation: Ensure correct metrics (MAE, RMSE, SMAPE)

            ## Claude API & Plugin Integration
            - Credentials: API keys via environment variables, NOT hardcoded
            - Error Handling: Try/except for API calls, rate limits, network errors
            - Plugin Security: Sanitize inputs to prevent injection
            - Response Parsing: Resilient to unexpected formatting

            ## Performance & Cloud Best Practices
            - Vectorization: Flag non-vectorized loops, use NumPy/Pandas
            - Resource Usage: Check memory usage and data duplication
            - Cloud Cost: Recommend efficiency for BigQuery/Cloud Storage

            Approve if code is good. Request changes with specific fixes if issues found.
