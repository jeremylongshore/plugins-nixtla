name: Gemini Pro Code Review (Vertex AI)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  gemini_review:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/859338910722/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: nixtla-github-deployer@nixtla-playground-01.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get PR diff
        id: diff
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/diff.txt
          # Truncate for API limits
          head -c 25000 /tmp/diff.txt > /tmp/diff_truncated.txt
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Review with Gemini
        id: review
        run: |
          DIFF=$(cat /tmp/diff_truncated.txt | jq -Rs .)

          PROMPT="You are a code reviewer for the Nixtla Claude Code Plugins project (time-series forecasting). Review this PR diff.

          Check for:
          - Security issues (hardcoded secrets, injection risks)
          - Python quality (PEP-8, error handling)
          - Nixtla patterns (unique_id/ds/y format)

          Respond with APPROVE on the first line if the code is good.
          Respond with CHANGES_REQUESTED on the first line if there are issues.
          Then provide a brief explanation.

          PR Diff:
          ${DIFF}"

          RESPONSE=$(curl -s "https://us-central1-aiplatform.googleapis.com/v1/projects/nixtla-playground-01/locations/us-central1/publishers/google/models/gemini-2.5-pro-preview-05-06:generateContent" \
            -H "Authorization: Bearer $(gcloud auth print-access-token)" \
            -H "Content-Type: application/json" \
            -d "{
              \"contents\": [{
                \"parts\": [{\"text\": $(echo "$PROMPT" | jq -Rs .)}]
              }],
              \"generationConfig\": {
                \"temperature\": 0.2,
                \"maxOutputTokens\": 2048
              }
            }")

          REVIEW=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "ERROR: Could not parse response"')
          FIRST_LINE=$(echo "$REVIEW" | head -1)

          echo "First line: $FIRST_LINE"
          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [[ "$FIRST_LINE" == *"APPROVE"* ]]; then
            echo "decision=approve" >> $GITHUB_OUTPUT
          else
            echo "decision=comment" >> $GITHUB_OUTPUT
          fi

      - name: Post Review
        run: |
          if [[ "${{ steps.review.outputs.decision }}" == "approve" ]]; then
            gh pr review ${{ github.event.pull_request.number }} --approve --body "✅ **Gemini Auto-Review: Approved**

          ${{ steps.review.outputs.review }}"
          else
            gh pr review ${{ github.event.pull_request.number }} --comment --body "🔍 **Gemini Auto-Review**

          ${{ steps.review.outputs.review }}"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
