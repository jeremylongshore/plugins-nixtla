# Forecasting Experiment Configuration
# Generated by nixtla-experiment-architect skill
# Full template with all configuration options

# Data Source
data:
  source: "data/sales.csv"  # Or SQL query, dbt ref, etc.
  unique_id: "store_id"     # Series identifier (null for single series)
  ds: "date"                # Timestamp column
  y: "sales"                # Target column
  exog_vars: []             # Exogenous variables (optional)

# Forecasting Parameters
forecast:
  horizon: 30               # Forecast h steps ahead
  freq: "D"                 # Pandas frequency string
  season_length: 7          # For seasonal models (7 for weekly, 12 for monthly)

# Cross-Validation Settings
cv:
  method: "rolling"         # "rolling" or "expanding"
  h: 14                     # Validation horizon
  step_size: 7              # How far to move window
  n_windows: 4              # Number of validation folds

# Models to Evaluate
models:
  statsforecast:
    - SeasonalNaive
    - AutoARIMA
    - AutoETS
    - AutoTheta

  mlforecast:
    enabled: true
    base_models:
      - RandomForestRegressor
      - LGBMRegressor
    lags: [1, 7, 14, 28]
    lag_transforms: true    # Add rolling mean/std features

  timegpt:
    enabled: false          # Set to true if NIXTLA_API_KEY available
    finetune_steps: 0       # 0 = no fine-tuning, 10-50 for adaptation
    level: [80, 90]         # Conformal prediction intervals

# Evaluation Metrics
metrics:
  - smape                   # Symmetric MAPE (default)
  - mase                    # Mean Absolute Scaled Error
  - rmse                    # Root Mean Squared Error

# Output Settings
output:
  save_forecasts: true      # Save forecast CSVs
  save_cv_results: true     # Save cross-validation results
  results_dir: "forecasting/results"
  plot_forecasts: false     # Generate plots (requires matplotlib)
