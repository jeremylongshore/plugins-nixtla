# Nixtla Forecasting Experiment Configuration
# Generated by: nixtla-experiment-architect skill (simulated)

experiment:
  name: "M4 Daily Baseline Comparison"
  description: "Compare TimeGPT vs StatsForecast on M4 daily data"
  version: "1.0.0"

data:
  path: "data/m4_daily_sample.csv"
  format: "nixtla"  # Already in (unique_id, ds, y) format
  target: "y"
  date_col: "ds"
  id_col: "unique_id"

forecast:
  horizon: 14  # 14 days ahead
  frequency: "D"  # Daily

models:
  timegpt:
    enabled: true  # Requires NIXTLA_API_KEY environment variable
    fallback_if_missing: true
    params:
      model: "timegpt-1"
      level: [80, 90]  # Prediction intervals

  statsforecast:
    enabled: true
    models:
      - name: "AutoETS"
        season_length: 7
      - name: "SeasonalNaive"
        season_length: 7

evaluation:
  metrics:
    - smape  # Symmetric Mean Absolute Percentage Error
    - mase   # Mean Absolute Scaled Error
  
  cross_validation:
    enabled: false  # Simple train/test split for demo

output:
  results_dir: "forecasting/results"
  save_predictions: true
  save_plots: true
  save_comparison: true
